---
name: Build UBlueOS image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

jobs:
  build_push:
    name: Build ${{ matrix.variant.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: stable
            base_image: ghcr.io/ublue-os/bazzite-dx:stable
          - name: stable-nvidia
            base_image: ghcr.io/ublue-os/bazzite-dx-nvidia-open:stable

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ matrix.variant.name }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Set image metadata
        id: meta
        run: |
          # Lowercase everything for GHCR
          REGISTRY="${IMAGE_REGISTRY,,}"
          NAME="ublueos"
          VARIANT="${{ matrix.variant.name }}"
          DATE_TAG="${VARIANT}-$(date -u +%Y%m%d)"

          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${NAME}" >> $GITHUB_ENV
          echo "VARIANT=${VARIANT}" >> $GITHUB_ENV
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV

      # Build the container image with the variant's base image
      - name: Build Image
        id: build
        run: |
          sudo podman build \
            --build-arg BASE_IMAGE=${{ matrix.variant.base_image }} \
            --label="containers.bootc=1" \
            -t ${IMAGE_NAME}:${VARIANT} \
            .

      # Rechunk for smaller delta updates (optional)
      - name: Rechunk with rpm-ostree
        id: rechunk
        continue-on-error: true
        run: |
          sudo dnf install -y rpm-ostree
          sudo rpm-ostree cli rechunk ${IMAGE_NAME}:${VARIANT}

      # Tag with date and (for stable) latest
      - name: Tag image
        id: tag
        run: |
          sudo podman tag ${IMAGE_NAME}:${VARIANT} ${IMAGE_NAME}:${DATE_TAG}
          if [ "${VARIANT}" = "stable" ]; then
            sudo podman tag ${IMAGE_NAME}:${VARIANT} ${IMAGE_NAME}:latest
          fi

      # Only push on main branch (not PRs)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        id: push-image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euox pipefail
          # Push variant tag
          sudo podman push --digestfile=/tmp/digestfile \
            ${IMAGE_NAME}:${VARIANT} \
            ${REGISTRY}/${IMAGE_NAME}:${VARIANT}
          DIGEST=$(cat /tmp/digestfile)

          # Push date tag
          sudo podman push \
            ${IMAGE_NAME}:${DATE_TAG} \
            ${REGISTRY}/${IMAGE_NAME}:${DATE_TAG}

          # Push 'latest' for stable variant
          if [ "${VARIANT}" = "stable" ]; then
            sudo podman push \
              ${IMAGE_NAME}:latest \
              ${REGISTRY}/${IMAGE_NAME}:latest
          fi

          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      # Sign the image with cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${REGISTRY}/${IMAGE_NAME}@${DIGEST}
