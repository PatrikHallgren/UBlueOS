# MangoWM default keybindings
# Based on theblackdon/mango-waybar style — Gruvbox theme default

bind = Super + Return     exec kitty
bind = Super + Space      exec wofi --show drun
bind = Super + Q          killclient
bind = Super + W          togglefloating

# Focus direction
bind = Super + Left       focusdir left
bind = Super + Right      focusdir right
bind = Super + Up         focusdir up
bind = Super + Down       focusdir down

# Move windows
bind = Super + Shift + Left   exchange_client left
bind = Super + Shift + Right  exchange_client right
bind = Super + Shift + Up     exchange_client up
bind = Super + Shift + Down   exchange_client down

# Workspaces (tags)
bind = Super + 1          view 1
bind = Super + 2          view 2
bind = Super + 3          view 3
bind = Super + 4          view 4
bind = Super + 5          view 5
bind = Super + 6          view 6
bind = Super + 7          view 7
bind = Super + 8          view 8
bind = Super + 9          view 9

bind = Super + Shift + 1  tag 1
bind = Super + Shift + 2  tag 2
bind = Super + Shift + 3  tag 3
bind = Super + Shift + 4  tag 4
bind = Super + Shift + 5  tag 5
bind = Super + Shift + 6  tag 6
bind = Super + Shift + 7  tag 7
bind = Super + Shift + 8  tag 8
bind = Super + Shift + 9  tag 9

bind = Super + 0          view 0
bind = Super + Shift + 0  tag 0

# Layouts
bind = Ctrl + Space       switch_layout
bind = Super + M          setlayout monocle
bind = Super + T          setlayout tile
bind = Super + S          setlayout scroller

# Fullscreen
bind = Alt + F            togglefullscreen

# Noctalia IPC (volume, brightness, launcher)
bind = Ctrl + Alt + L     exec noctalia msg -- toggle-launcher
bind = XF86AudioRaiseVolume  exec noctalia msg -- adjust-volume up
bind = XF86AudioLowerVolume  exec noctalia msg -- adjust-volume down
bind = XF86AudioMute         exec noctalia msg -- toggle-mute
bind = XF86MonBrightnessUp   exec noctalia msg -- adjust-brightness up
bind = XF86MonBrightnessDown exec noctalia msg -- adjust-brightness down

# Screenshot
bind = Super + Shift + S  exec grim -g "$(slurp)" - | wl-copy

# Reload config
bind = Super + Alt + R    exec mango -c
